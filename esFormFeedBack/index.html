<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Modulo di feedback</title>
  <script src="script.js" defer></script>
</head>
<body>

  <h1>Modulo di feedback</h1>

  <p id="avviso" style="color: red; display: none;">Compila tutti i campi obbligatori!</p>

  <form>

    <label for="nome">Nome</label><br>
    <input type="text" id="nome"><br><br>

    <label for="email">Email</label><br>
    <input type="text" id="email"><br><br>

    <label for="data">Data del feedback</label><br>
    <input type="date" id="data"><br><br>

    <label for="ora">Ora del feedback</label><br>
    <input type="time" id="ora"><br><br>

    <label for="tipo">Tipo di feedback</label><br>
    <select id="tipo">
      <option value="">-- Seleziona --</option>
      <option value="Richiesta">Richiesta</option>
      <option value="Segnalazione">Segnalazione</option>
      <option value="Complimento">Complimento</option>
      <option value="Suggerimento">Suggerimento</option>
    </select><br><br>

    <label for="messaggio">Messaggio</label><br>
    <textarea id="messaggio" rows="5" cols="30"></textarea><br><br>

    <input type="checkbox" id="newsletter">
    <label for="newsletter">Iscriviti alla newsletter</label><br><br>

    <input type="button" value="Invia feedback" onclick="inviaModulo()">

  </form>

  <p id="riepilogo" style="display: none;"></p>
</body>
</html>
